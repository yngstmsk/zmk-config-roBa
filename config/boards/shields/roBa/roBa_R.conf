CONFIG_ZMK_KEYBOARD_NAME="roBa"

CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y

CONFIG_ZMK_BLE=y

CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_INPUT_PMW3610=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# xiao_ble//zmk defconfig forces CONFIG_ZMK_USB=y, which makes the keyboard prefer USB
# over BLE and prevents BLE advertising. roBa is wireless-only so USB HID is disabled.
CONFIG_ZMK_USB=n

# [2026-03] Windows BLE random disconnect fix
# Battery notifications trigger a known Windows GATT subscription bug causing disconnections.
# Ref: https://zmk.dev/docs/config/bluetooth
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# Increase TX power to +8 dBm. ZMK docs state power consumption difference is negligible.
# Ref: https://zmk.dev/docs/troubleshooting/connection-issues
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Disable 2M PHY for compatibility with Intel/Realtek BT adapters on Windows.
# Ref: https://zmk.dev/docs/troubleshooting/connection-issues
CONFIG_BT_CTLR_PHY_2M=n

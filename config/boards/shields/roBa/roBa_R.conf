CONFIG_ZMK_KEYBOARD_NAME="roBa"

CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y

CONFIG_ZMK_BLE=y

CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_INPUT_PMW3610=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# xiao_ble//zmk defconfig forces CONFIG_ZMK_USB=y, which makes the keyboard prefer USB
# over BLE and prevents BLE advertising. roBa is wireless-only so USB HID is disabled.
CONFIG_ZMK_USB=n

# [2026-03] Windows BLE random disconnect fix
# Battery notifications trigger a known Windows GATT subscription bug causing disconnections.
# Ref: https://zmk.dev/docs/config/bluetooth
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# Increase TX power to +8 dBm. ZMK docs state power consumption difference is negligible.
# Ref: https://zmk.dev/docs/troubleshooting/connection-issues
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Disable 2M PHY for compatibility with Intel/Realtek BT adapters on Windows.
# Ref: https://zmk.dev/docs/troubleshooting/connection-issues
CONFIG_BT_CTLR_PHY_2M=n

# [2026-03] Long-session disconnect fix
# Prevent Windows from triggering connection parameter renegotiation after long sessions.
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
# ZMK experimental connection stability improvements (PHY_2M=n already applied, no conflict).
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# [2026-03] NVS bond data corruption prevention
# Reduce NVS write frequency: save at most once per 60s instead of default 5s.
# Fewer writes = fewer chances of corruption if firmware crashes mid-write.
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=60000
# Disable GATT service cache (largest source of NVS writes on each PC connection).
# Windows re-discovers services on connect (~50ms), eliminating this write entirely.
CONFIG_BT_GATT_CACHING=n
# Ensure enough BLE connection slots for Central (Windows) + Peripheral (roBa_L).
# BT_MAX_PAIRED must match BT_MAX_CONN per ZMK docs.
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

# [2026-03] Extended session stability
# Explicitly disable deep sleep to prevent BLE disconnection after inactivity.
CONFIG_ZMK_SLEEP=n
# BLE notify thread: default 768. roBa_R multiplexes kbd + mouse + battery + split.
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1536
# HID report queues (defaults: kbd/mouse 20, consumer 5). Burst headroom for central role.
CONFIG_ZMK_BLE_KEYBOARD_REPORT_QUEUE_SIZE=30
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=40
CONFIG_ZMK_BLE_CONSUMER_REPORT_QUEUE_SIZE=10

CONFIG_ZMK_BLE=y
CONFIG_NFCT_PINS_AS_GPIOS=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_POINTING=y

# xiao_ble//zmk defconfig forces CONFIG_ZMK_USB=y. Disabled for wireless-only operation.
CONFIG_ZMK_USB=n

# [2026-03] Windows BLE random disconnect fix (same rationale as roBa_R.conf)
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_BT_CTLR_PHY_2M=n

# [2026-03] Long-session disconnect fix (same rationale as roBa_R.conf)
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# [2026-03] NVS bond data corruption prevention (same rationale as roBa_R.conf)
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=60000
